    <img src="/static/img/brands/logo.png" alt="ManhwaV7 logo">
    <span class="title">ManhwaV7</span>
  </div>

  <!-- Navegación principal (visible en desktop) -->
  <nav class="nav-links">
    <a href="/">Inicio</a>
    <a href="/catalogo">Catálogo</a>
    <a href="/ranking">Ranking</a>
    <a href="/lista">Mi lista</a>
  </nav>

  <!-- Acciones: buscador y avatar (visibles en desktop) -->

<!-- Menú móvil (oculto inicialmente) -->
